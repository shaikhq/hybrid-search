<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hybrid Search on Db2 12.1.5</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Hybrid Search on Db2&nbsp;12.1.5</h1>
      <p class="sub">Each retriever has a blind spot — hybrid covers both.</p>
    </div>
    <div class="legend" aria-label="color legend">
      <span class="chip chip-bm25">Lexical · BM25</span>
      <span class="chip chip-vector">Vector · semantic</span>
      <span class="chip chip-both">Hybrid · both</span>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT: the demo deck -->
    <aside class="deck" aria-label="curated queries">
      <h2>Eval queries</h2>
      <ul id="deck-list"></ul>
    </aside>

    <!-- CENTER: search + results -->
    <section class="stage">
      <div class="controls">
        <input id="searchbox" type="text" placeholder="Pick a query on the left…"
               autocomplete="off" spellcheck="false" />
        <div class="modes" id="modes" role="radiogroup" aria-label="search strategy">
          <button class="mode" data-mode="lexical" role="radio">Lexical</button>
          <button class="mode" data-mode="vector" role="radio">Vector</button>
          <button class="mode" data-mode="hybrid" role="radio">Hybrid</button>
        </div>
        <button id="run" class="run">Search</button>
      </div>
      <p class="fused-hint" id="fused-hint" hidden>
        Hybrid <strong>subsumes</strong> Lexical&nbsp;⊕&nbsp;Vector — it reuses both, then fuses.
      </p>

      <div class="toggles">
        <label><input type="checkbox" id="t-scores" /> Show scores</label>
        <label><input type="checkbox" id="t-agg" /> Show hit-rate across all queries</label>
      </div>
      <div id="agg" class="agg" hidden></div>

      <div id="output" class="output">
        <p class="placeholder">Choose a query from the left, pick a strategy, and hit Search.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
